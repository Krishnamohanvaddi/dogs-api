# Local dev — these get overridden by Render environment variables in production
spring.datasource.url=${DATABASE_URL:jdbc:postgresql://localhost:5432/dogsdb}
spring.datasource.username=${DATABASE_USERNAME:postgres}
spring.datasource.password=${DATABASE_PASSWORD:postgres}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# Seeds the data.sql only once when the schema is created fresh
spring.sql.init.mode=never